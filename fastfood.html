<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fast Food Menu</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Choose Your Favorite Fast Food</h1>
    <div id="cart-summary">
      <a href="cart.html" style="position: relative; display: inline-block;">
        <img src="images/cart.png" alt="Cart" style="width:50px;height:50px;">
        <span id="cart-count" 
              style="position:absolute; top:0; right:0; background:red; color:white; border-radius:50%; padding:2px 6px; font-size:14px;">
          0
        </span>
      </a>
    </div>
  </header>

  <main>
    <div class="products">
      <div class="product">
        <img src="images/pizza.jpg" alt="Pizza">
        <h3>Pizza</h3>
        <input type="number" min="0" value="0" id="qty-pizza">
      </div>
      <div class="product">
        <img src="images/burger.jpg" alt="Burger">
        <h3>Burger</h3>
        <input type="number" min="0" value="0" id="qty-burger">
      </div>
      <div class="product">
        <img src="images/mojito.jpg" alt="Mojito">
        <h3>Mojito</h3>
        <input type="number" min="0" value="0" id="qty-mojito">
      </div>
    </div>
    <button id="add-to-cart">Add to Cart</button>
  </main>

  <script>
    const cart = JSON.parse(localStorage.getItem('cart') || '[]');
    document.getElementById('cart-count').textContent = cart.length;

    document.getElementById('add-to-cart').addEventListener('click', () => {
      let cart = JSON.parse(localStorage.getItem('cart') || '[]');

      const pizzaQty = parseInt(document.getElementById('qty-pizza').value);
      const burgerQty = parseInt(document.getElementById('qty-burger').value);
      const mojitoQty = parseInt(document.getElementById('qty-mojito').value);

      if(pizzaQty > 0) cart.push({name:'Pizza', qty:pizzaQty});
      if(burgerQty > 0) cart.push({name:'Burger', qty:burgerQty});
      if(mojitoQty > 0) cart.push({name:'Mojito', qty:mojitoQty});

      localStorage.setItem('cart', JSON.stringify(cart));
      window.location.href = 'cart.html';
    });
  </script>
</body>
</html>
